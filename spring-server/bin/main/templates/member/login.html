<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>로그인</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div class="page-shell d-flex flex-column">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container flex-grow-1 py-5">
        <div class="mx-auto form-page">
            <div class="text-center mb-4">
                <h1 class="h3 fw-bold">로그인</h1>
                <p class="text-muted mb-0">게시판 기능은 로그인 후 사용할 수 있습니다.</p>
            </div>

            <div class="content-panel p-4 shadow-sm">
                <div th:if="${param.error}" class="alert alert-danger">
                    아이디 또는 비밀번호가 올바르지 않습니다.
                </div>
                <div th:if="${param.logout}" class="alert alert-success">
                    로그아웃되었습니다.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">아이디</label>
                        <input type="text" id="username" name="username" class="form-control form-control-lg">
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">비밀번호</label>
                        <input type="password" id="password" name="password" class="form-control form-control-lg">
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">로그인</button>
                </form>

                <div class="mt-3 text-center">
                    <a th:href="@{/members/signup}" class="link-primary text-decoration-none">회원가입</a>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
