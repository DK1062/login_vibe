<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>비만 예측</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div class="page-shell d-flex flex-column">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container flex-grow-1 py-5">
        <div class="mx-auto form-page">
            <div class="text-center mb-4">
                <span class="badge text-bg-primary mb-3">Guest Available</span>
                <h1 class="h3 fw-bold">AI 비만 예측</h1>
                <p class="text-muted mb-0">회원가입 없이도 키와 몸무게만으로 예측 기능을 사용할 수 있습니다.</p>
            </div>

            <div class="content-panel p-4 shadow-sm">
                <form th:action="@{/predict}" th:object="${predictRequestDto}" method="post">
                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                        <p class="mb-0" th:each="error : ${#fields.globalErrors()}" th:text="${error}">예측 오류</p>
                    </div>

                    <div class="mb-3">
                        <label for="height" class="form-label fw-semibold">키(cm)</label>
                        <input type="number" step="0.1" id="height" th:field="*{height}" class="form-control form-control-lg"
                               placeholder="예: 170">
                        <div class="text-danger small mt-1" th:errors="*{height}"></div>
                    </div>

                    <div class="mb-4">
                        <label for="weight" class="form-label fw-semibold">몸무게(kg)</label>
                        <input type="number" step="0.1" id="weight" th:field="*{weight}" class="form-control form-control-lg"
                               placeholder="예: 70">
                        <div class="text-danger small mt-1" th:errors="*{weight}"></div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100">예측하기</button>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
