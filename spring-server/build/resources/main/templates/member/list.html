<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>회원 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div class="page-shell d-flex flex-column">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container flex-grow-1 py-5">
        <div class="mb-4">
            <h1 class="h3 fw-bold mb-1">회원 목록</h1>
            <p class="text-muted mb-0">관리자 전용 회원 조회 화면입니다.</p>
        </div>

        <div class="content-panel shadow-sm overflow-hidden">
            <div class="table-responsive">
                <table class="table table-striped align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>아이디</th>
                        <th>이름</th>
                        <th>권한</th>
                        <th>가입일</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="member : ${members}">
                        <td th:text="${member.id()}">1</td>
                        <td th:text="${member.username()}">user1</td>
                        <td th:text="${member.name()}">홍길동</td>
                        <td>
                            <span class="badge text-bg-primary" th:text="${member.role()}">USER</span>
                        </td>
                        <td th:text="${#temporals.format(member.createdAt(), 'yyyy-MM-dd HH:mm')}">2026-05-27 10:00</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
