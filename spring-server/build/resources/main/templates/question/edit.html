<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div class="page-shell d-flex flex-column">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container flex-grow-1 py-5">
        <div class="mx-auto" style="max-width: 820px;">
            <div class="mb-4">
                <h1 class="h3 fw-bold mb-1">게시글 수정</h1>
                <p class="text-muted mb-0">작성한 게시글의 제목과 내용을 수정합니다.</p>
            </div>

            <div class="content-panel p-4 shadow-sm">
                <form th:action="@{/questions/{id}/edit(id=${questionId})}" th:object="${questionUpdateRequest}" method="post">
                    <div class="mb-3">
                        <label for="subject" class="form-label fw-semibold">제목</label>
                        <input type="text" id="subject" th:field="*{subject}" class="form-control">
                        <div class="text-danger small mt-1" th:errors="*{subject}"></div>
                    </div>

                    <div class="mb-4">
                        <label for="content" class="form-label fw-semibold">내용</label>
                        <textarea id="content" th:field="*{content}" class="form-control" rows="10"></textarea>
                        <div class="text-danger small mt-1" th:errors="*{content}"></div>
                    </div>

                    <div class="d-flex flex-column flex-sm-row gap-2">
                        <button type="submit" class="btn btn-primary">저장</button>
                        <a th:href="@{/questions/{id}(id=${questionId})}" class="btn btn-outline-secondary">취소</a>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
