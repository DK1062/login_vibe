<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 상세</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div class="page-shell d-flex flex-column">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container flex-grow-1 py-5">
        <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

        <div class="content-panel p-4 shadow-sm">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-start gap-3 border-bottom pb-3 mb-4">
                <div>
                    <h1 class="h3 fw-bold mb-2" th:text="${question.subject()}">게시글 제목</h1>
                    <div class="text-muted small">
                        <span th:text="${question.authorName()}">작성자</span>
                        <span class="mx-2">|</span>
                        <span th:text="${#temporals.format(question.createdAt(), 'yyyy-MM-dd HH:mm')}">2026-05-27 10:00</span>
                    </div>
                </div>
                <a th:href="@{/questions}" class="btn btn-outline-secondary">목록</a>
            </div>

            <article class="question-content mb-4" th:text="${question.content()}">게시글 내용</article>

            <div class="d-flex flex-column flex-sm-row gap-2 border-top pt-3" th:if="${canModify}">
                <a th:href="@{/questions/{id}/edit(id=${question.id()})}" class="btn btn-primary">수정</a>
                <form th:action="@{/questions/{id}/delete(id=${question.id()})}" method="post"
                      onsubmit="return confirm('게시글을 삭제하시겠습니까?');">
                    <button type="submit" class="btn btn-danger w-100">삭제</button>
                </form>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
