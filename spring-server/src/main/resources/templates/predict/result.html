<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>예측 결과</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div class="page-shell d-flex flex-column">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container flex-grow-1 py-5">
        <div class="mx-auto form-page">
            <div class="text-center mb-4">
                <h1 class="h3 fw-bold">예측 결과</h1>
                <p class="text-muted mb-0">입력한 정보를 기반으로 Flask AI 서버가 반환한 결과입니다.</p>
            </div>

            <div class="content-panel p-4 shadow-sm">
                <div class="alert alert-primary mb-4">
                    <div class="small text-primary-emphasis mb-1">비만 여부 예측 결과</div>
                    <div class="h3 fw-bold mb-0" th:text="${response.result()}">정상</div>
                </div>

                <dl class="row mb-0">
                    <dt class="col-5">키</dt>
                    <dd class="col-7" th:text="${request.height()} + ' cm'">170 cm</dd>

                    <dt class="col-5">몸무게</dt>
                    <dd class="col-7" th:text="${request.weight()} + ' kg'">70 kg</dd>
                </dl>
            </div>

            <div class="d-flex flex-column flex-sm-row gap-2 mt-4">
                <a th:href="@{/predict}" class="btn btn-primary flex-fill">다시 예측</a>
                <a th:href="@{/}" class="btn btn-outline-secondary flex-fill">메인으로</a>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
