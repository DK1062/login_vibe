<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body>
<div class="page-shell d-flex flex-column">
    <div th:replace="~{layout/header :: header}"></div>

    <main class="container flex-grow-1 py-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4">
            <div>
                <h1 class="h3 fw-bold mb-1">게시판</h1>
                <p class="text-muted mb-0">로그인 사용자가 건강 정보와 프로젝트 의견을 공유하는 공간입니다.</p>
            </div>
            <a th:href="@{/questions/new}" class="btn btn-primary">글쓰기</a>
        </div>

        <div class="content-panel shadow-sm overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th style="width: 80px;">번호</th>
                        <th>제목</th>
                        <th style="width: 160px;">작성자</th>
                        <th style="width: 180px;">작성일</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(questions)}">
                        <td colspan="4" class="text-center text-muted py-5">등록된 게시글이 없습니다.</td>
                    </tr>
                    <tr th:each="question : ${questions}">
                        <td th:text="${question.id()}">1</td>
                        <td>
                            <a th:href="@{/questions/{id}(id=${question.id()})}"
                               th:text="${question.subject()}"
                               class="fw-semibold link-dark text-decoration-none">게시글 제목</a>
                        </td>
                        <td th:text="${question.authorName()}">홍길동</td>
                        <td th:text="${#temporals.format(question.createdAt(), 'yyyy-MM-dd HH:mm')}">2026-05-27 10:00</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div th:replace="~{layout/footer :: footer}"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
