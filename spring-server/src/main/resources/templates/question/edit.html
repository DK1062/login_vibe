<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>게시글 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="h3 mb-4">게시글 수정</h1>

            <form th:action="@{/questions/{id}/edit(id=${questionId})}" th:object="${questionUpdateRequest}" method="post">
                <div class="mb-3">
                    <label for="subject" class="form-label">제목</label>
                    <input type="text" id="subject" th:field="*{subject}" class="form-control">
                    <div class="text-danger small mt-1" th:errors="*{subject}"></div>
                </div>

                <div class="mb-4">
                    <label for="content" class="form-label">내용</label>
                    <textarea id="content" th:field="*{content}" class="form-control" rows="10"></textarea>
                    <div class="text-danger small mt-1" th:errors="*{content}"></div>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">저장</button>
                    <a th:href="@{/questions/{id}(id=${questionId})}" class="btn btn-outline-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
