spring:
  application:
    name: login-project
  datasource:
    url: jdbc:mysql://localhost:3306/login_project?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

server:
  port: 8080

flask:
  predict-url: http://localhost:5000/predict
